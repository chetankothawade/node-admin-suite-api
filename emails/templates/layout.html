<!DOCTYPE html>
<html>
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{{siteName}}</title>
   </head>
   <body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4;">
         <tr>
            <td align="center">
               <!-- Wrapper Table -->
               <table width="600" cellpadding="0" cellspacing="0" border="0"
                  style="width: 100%; max-width: 600px; background-color: #ffffff; border: 1px solid #cccccc;"
                  bgcolor="#ffffff">
                  <!-- Header -->
                  <tr>
                     <td align="center" style="padding: 20px;">
                        <img src="logo.png" alt="{{siteName}}" style="display: block; max-width: 200px; height: auto;">
                     </td>
                  </tr>
                  <!-- Content -->
                  <tr>
                     <td style="padding: 20px; font-size: 14px; line-height: 1.5; color: #333333;">
                        {{{body}}}
                        <p>Thanks,<br />The {{siteName}} Team</p>
                        <p style="font-size: 12px; color: #ed4444; margin-top: 10px;">
                           Note: This is a system generated email, please do not reply to this email id.
                        </p>
                     </td>
                  </tr>
                  <!-- Footer -->
                  <tr bgcolor="#3498db">
                     <td align="center" style="padding: 10px; font-size: 14px; color: #ffffff;">
                        <a href="{{baseUrl}}" style="color: #ffffff; text-decoration: none;">Privacy Policy</a> |
                        <a href="{{baseUrl}}" style="color: #ffffff; text-decoration: none;">Terms of Use</a>
                     </td>
                  </tr>
               </table>
            </td>
         </tr>
      </table>
   </body>
</html>
