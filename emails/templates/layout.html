<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>{{siteName}}</title>
</head>

<body style="margin:0;padding:0;background:#eef2f7;font-family:Segoe UI,Roboto,Arial,sans-serif;">

   <table width="100%" cellpadding="0" cellspacing="0" border="0" style="padding:40px 0;">
      <tr>
         <td align="center">

            <!-- Main Card -->
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:12px;overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,0.08);">

               <!-- Header -->
               <tr>
                  <td align="center" style="padding:20px 20px; background:linear-gradient(135deg,#4facfe,#00f2fe);">
                     <img src="{{logoSrc}}" alt="{{siteName}}"
                        style="max-width:250px;height:auto;display:block;margin:auto;">
                  </td>
               </tr>

               <!-- Greeting Section -->
               <tr>
                  <td style="padding:30px 40px 10px 40px;color:#2c3e50;font-size:16px;line-height:1.6;">

                     {{{body}}}

                  </td>
               </tr>


               <!-- Divider -->
               <tr>
                  <td style="padding:0 40px;">
                     <hr style="border:none;border-top:1px solid #eeeeee;">
                  </td>
               </tr>

               <!-- Signature -->
               <tr>
                  <td style="padding:25px 40px;color:#444;font-size:14px;line-height:1.6;">

                     Best Regards,<br>
                     <strong>The {{siteName}} Team</strong>

                     <p style="margin-top:18px;font-size:12px;color:#888;">
                        This is an automated email. Please do not reply to this message.
                     </p>

                  </td>
               </tr>

               <!-- Footer -->
               <tr>
                  <td align="center" style="background:#f9fafc;padding:20px 30px;font-size:13px;color:#777;">
                     <p style="margin:0;">
                        © {{year}} {{siteName}}. All rights reserved.
                     </p>
                  </td>
               </tr>

            </table>

         </td>
      </tr>
   </table>

</body>

</html>
